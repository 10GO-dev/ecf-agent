# Configuración del Agente ECF - SQLite (Para pruebas locales)
# 
# Usar con la estructura real del cliente (basado en script.sql)
# 
# Para crear la BD de prueba:
#   python scripts/setup_test_db.py
#
# Para ejecutar:
#   python -m src.main run --config config/config-sqlite.yaml

agent:
  # RNC del cliente (emisor de los comprobantes)

  # Mapeo numérico para el estado devuelto por la DGII
  # Se inyectará en la variable {status}
  status_mapping:
    not_found: 0
    accepted: 1
    rejected: 2
    pending: 3
    conditional_accepted: 4

  # Query para marcar que la factura ya fue leída/enviada al backend (estado interno ERP)
  # Variables disponibles: {id}
  update_query: |
    UPDATE interfazencf 
    SET estado = '1'
    WHERE transaccionid = {id}

  # Query para marcar como error interno definitivo (Opcional)
  # Variables disponibles: {ecf}, {id}, {error}
  update_error_query: |
    UPDATE interfazencf
    SET estado = '2',
        mensaje_error = '{error}'
    WHERE encf = '{ecf}'

  # ============================================================
  # QUERIES PARA SINCRONIZACIÓN DE ESTADOS (Fallback)
  # ============================================================
  # Query para obtener facturas que se enviaron pero están pendientes de estado DGII
  pending_status_query: |
    SELECT encf as ecf_number
    FROM interfazencf 
    WHERE estado = '1' AND (procesadadgii = '0' OR procesadadgii = '' OR procesadadgii IS NULL)
    LIMIT {batch_size}

  # Query para actualizar el estado devuelto por la DGII
  # Parámetros disponibles: {ecf}, {status}, {track_id}, {error}
  update_status_query: |
    UPDATE interfazencf 
    SET procesadadgii = '{status}'
    WHERE encf = '{ecf}'
  customer_rnc: "130013454"
  
  # Intervalo de polling a la base de datos (segundos)
  polling_interval_seconds: 10
  
           MontoTotal as total_amount
    FROM interfazencf
    WHERE estado = '0'
    ORDER BY transaccionid ASC
    LIMIT {batch_size}

  # Subqueries para extraccion DB-Agnostic
  details_query: |
    SELECT * 
    FROM interfazencfdet 
    WHERE transaccionid IN ({ids})
  
  taxes_query: |
    SELECT * 
    FROM ecftipoimpadic 
    WHERE transaccionid IN ({ids})
    
  payments_query: |
    SELECT * 
    FROM ecfformapago 
    WHERE transaccionid IN ({ids})
  

  # Campos de metadatos
  id_field: "id"
  ecf_field: "ecf_number"
  type_field: "ecf_type"
  rnc_buyer_field: "rnc_buyer"
  total_field: "total_amount"
  
  # Mapeo numérico para el estado devuelto por la DGII
  # Se inyectará en la variable {status}
  status_mapping:
    not_found: 0
    accepted: 1
    rejected: 2
    pending: 3
    conditional_accepted: 4

  # Query para marcar que la factura ya fue leída/enviada al backend (estado interno ERP)
  # Paramámetros disponibles: {id}
  update_query: |
    UPDATE interfazencf 
    SET estado = '1'
    WHERE transaccionid = {id}

  # Query para marcar como error interno definitivo (Opcional)
  # Variables disponibles: {ecf}, {id}, {error}
  update_error_query: |
    UPDATE interfazencf
    SET estado = '2',
        procesadadgii = '{error}'
    WHERE encf = '{ecf}'

  # Query para actualizar el estado devuelto por la DGII (procesadadgii)
  # Parámetros disponibles: {ecf}, {status}, {track_id}
  update_status_query: |
    UPDATE interfazencf 
    SET procesadadgii = '{status}'
    WHERE encf = '{ecf}'

# Cola de reintentos
queue:
  db_path: "./data/retry_queue.db"

# Configuración de logs
logging:
  level: "DEBUG"
  file: "./logs/ecf-agent-test.log"
  max_size_mb: 5
  backup_count: 3
  console: true
