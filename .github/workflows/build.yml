name: Build and Release Agent

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g. v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python build.py
        mkdir ecf-agent-windows
        cp dist/ecf-agent.exe ecf-agent-windows/
        cp install.ps1 ecf-agent-windows/
        cp config/config.example.yaml ecf-agent-windows/
        compress-archive -Path ecf-agent-windows/* -DestinationPath ecf-agent-windows.zip

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        python build.py
        mkdir ecf-agent-linux
        cp dist/ecf-agent ecf-agent-linux/
        cp install-binary.sh ecf-agent-linux/
        cp install-source.sh ecf-agent-linux/
        cp -r src ecf-agent-linux/
        cp requirements.txt ecf-agent-linux/
        cp config/config.example.yaml ecf-agent-linux/
        # Asegurar permisos de ejecución antes de empaquetar
        chmod +x ecf-agent-linux/ecf-agent
        chmod +x ecf-agent-linux/*.sh
        tar -czf ecf-agent-linux.tar.gz ecf-agent-linux/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ecf-agent-${{ matrix.os }}
        path: |
          *.zip
          *.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          ./artifacts/ecf-agent-windows.zip
          ./artifacts/ecf-agent-linux.tar.gz
        generate_release_notes: true
